<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal AI: Token Predictor Demo</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background-color: #f8f9fa; color: #212529; max-width: 850px; margin: 40px auto; padding: 20px; line-height: 1.5; }
        .container { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid #e9ecef; }
        h1 { color: #2c3e50; font-size: 2rem; margin-bottom: 8px; }
        .tagline { color: #6c757d; margin-bottom: 25px; font-style: italic; }
        #input-box { width: 100%; height: 140px; padding: 18px; font-size: 1.1rem; border: 2px solid #dee2e6; border-radius: 12px; resize: none; transition: all 0.2s ease; box-sizing: border-box; }
        #input-box:focus { border-color: #007bff; outline: none; box-shadow: 0 0 0 4px rgba(0,123,255,0.1); }
        .label { font-weight: 600; margin: 25px 0 12px; display: block; color: #495057; text-transform: uppercase; letter-spacing: 0.5px; font-size: 0.85rem; }
        .suggestion-grid { display: flex; gap: 10px; flex-wrap: wrap; min-height: 52px; align-items: center; }
        .word-chip { background: #007bff; color: white; border: none; padding: 10px 22px; border-radius: 50px; cursor: pointer; font-weight: 500; font-size: 1rem; transition: all 0.2s; }
        .word-chip:hover { background: #0056b3; transform: translateY(-1px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .word-chip:active { transform: scale(0.96); }
        .status-panel { margin-top: 35px; padding: 15px; background: #212529; color: #adb5bd; border-radius: 8px; font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', monospace; font-size: 0.8rem; border-left: 4px solid #007bff; }
        .loading { color: #ffc107; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .error-msg { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Legal "Token" Predictor</h1>
    <p class="tagline">Demonstrating how LLMs predict the next word based on statistical probability.</p>

    <textarea id="input-box" placeholder="Example: 'The burden of proof lies with...'"></textarea>

    <span class="label">Top Predicted Next Words:</span>
    <div id="suggestions" class="suggestion-grid">
        <span style="color:#adb5bd">Start typing to see AI predictions...</span>
    </div>

    <div class="status-panel" id="status">
        [System] Initializing connection to Puter AI...
    </div>
</div>

<script>
    const inputBox = document.getElementById('input-box');
    const suggestionsDiv = document.getElementById('suggestions');
    const statusDiv = document.getElementById('status');
    let timeout = null;

    // List of models to try in order of preference
    const MODELS = ['gpt-5-nano', 'gpt-5-mini', 'gpt-4o-mini'];

    inputBox.addEventListener('input', () => {
        clearTimeout(timeout);
        const text = inputBox.value.trim();
        if (text.length < 3) return;
        timeout = setTimeout(() => fetchPredictions(text), 500);
    });

    async function fetchPredictions(context, modelIndex = 0) {
        if (modelIndex >= MODELS.length) {
            suggestionsDiv.innerHTML = '<span class="error-msg">All models failed. Please check internet connection.</span>';
            return;
        }

        const currentModel = MODELS[modelIndex];
        suggestionsDiv.innerHTML = `<span class="loading">Consulting ${currentModel}...</span>`;
        statusDiv.innerText = `[Request] Model: ${currentModel} | Context: "...${context.slice(-15)}"`;

        try {
            const prompt = `You are a legal text completion engine. Provide exactly 4 single-word completions for this text. Output ONLY the words separated by commas. Context: "${context}"`;
            
            const response = await puter.ai.chat(prompt, { model: currentModel });
            
            // Clean and parse the response
            const rawContent = response.message.content;
            const words = rawContent.replace(/[\[\]\"\'\.]/g, '').split(',').map(w => w.trim()).filter(w => w.length > 0);

            suggestionsDiv.innerHTML = '';
            words.slice(0, 4).forEach(word => {
                const btn = document.createElement('button');
                btn.className = 'word-chip';
                btn.innerText = word;
                btn.onclick = () => {
                    inputBox.value += (inputBox.value.endsWith(' ') ? '' : ' ') + word;
                    fetchPredictions(inputBox.value);
                    inputBox.focus();
                };
                suggestionsDiv.appendChild(btn);
            });
            statusDiv.innerText = `[Success] Predictions returned from ${currentModel}.`;

        } catch (error) {
            console.warn(`Model ${currentModel} failed:`, error.message);
            // Try the next model in the list
            fetchPredictions(context, modelIndex + 1);
        }
    }

    // Initial check
    window.onload = () => {
        statusDiv.innerText = "[System] Ready. Please ensure you are signed into Puter.";
    };
</script>

</body>
</html>
